name: E2E Tests

env:
  GIT_LFS_SKIP_SMUDGE: 1
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_DEV_CODEGEN_UNITS: "16"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # See ci.yml — cancel superseded runs only on PR branches; let main
  # always finish so we actually report a signal for every commit.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  windows-e2e-test:
    name: Windows E2E Tests
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Install Scream on Windows
      shell: powershell
      run: |
        Invoke-WebRequest https://github.com/duncanthrax/scream/releases/download/4.0/Scream4.0.zip -OutFile Scream4.0.zip
        Expand-Archive -Path Scream4.0.zip -DestinationPath Scream
        openssl req -batch -verbose -x509 -newkey rsa -keyout ScreamCertificate.pvk -out ScreamCertificate.cer -nodes -extensions v3_req
        openssl pkcs12 -export -nodes -in ScreamCertificate.cer -inkey ScreamCertificate.pvk -out ScreamCertificate.pfx -passout pass:

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1

    - name: Sign and Install Scream Driver on Windows
      shell: powershell
      run: |
        signtool sign /v /fd SHA256 /f ScreamCertificate.pfx Scream\Install\driver\x64\Scream.cat
        Import-Certificate -FilePath ScreamCertificate.cer -CertStoreLocation Cert:\LocalMachine\root
        Import-Certificate -FilePath ScreamCertificate.cer -CertStoreLocation Cert:\LocalMachine\TrustedPublisher
        Scream\Install\helpers\devcon-x64.exe install Scream\Install\driver\x64\Scream.inf *Scream
      timeout-minutes: 5

    - name: Start Windows Audio Service
      shell: powershell
      run: |
        $service = Get-Service -Name audiosrv
        if ($service.Status -ne 'Running') {
          net start audiosrv
        } else {
          Write-Host "Audio service is already running"
        }

    - name: Cache Windows build artifacts
      uses: actions/cache@v4
      with:
        path: |
          apps/screenpipe-app-tauri/src-tauri/ffmpeg
          apps/screenpipe-app-tauri/src-tauri/vcredist
          apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.22.0
          apps/screenpipe-app-tauri/src-tauri/bun-x86_64-pc-windows-msvc.exe
        key: Windows-e2e-artifacts-v2-${{ hashFiles('apps/screenpipe-app-tauri/scripts/pre_build.js') }}
        restore-keys: |
          Windows-e2e-artifacts-v2-

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        override: true
        rustflags: ""
        target: x86_64-pc-windows-msvc

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure sccache
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
      shell: bash

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/screenpipe-app-tauri/src-tauri
        shared-key: screenpipe-tauri-e2e

    - name: Configure Bun cache on same drive as workspace (Windows perf fix)
      shell: pwsh
      run: |
        $drive = (Split-Path $env:GITHUB_WORKSPACE -Qualifier).TrimEnd(':')
        echo "BUN_INSTALL_CACHE_DIR=${drive}:/bun" >> $env:GITHUB_ENV
        echo "BUN_INSTALL_GLOBAL_DIR=${drive}:/bun-global" >> $env:GITHUB_ENV

    - name: Install frontend dependencies
      working-directory: ./apps/screenpipe-app-tauri
      run: bun install --frozen-lockfile

    - name: Download ONNX Runtime (CPU) for Windows
      shell: pwsh
      run: |
        $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-win-x64-1.22.0.zip"
        $tauriDir = "apps/screenpipe-app-tauri/src-tauri/onnxruntime-win-x64-1.22.0"
        $ortDir = "ort-system-lib"
        Invoke-WebRequest -Uri $url -OutFile "onnxruntime-win-x64-1.22.0.zip"
        if (Test-Path $tauriDir) { Remove-Item $tauriDir -Recurse -Force }
        7z x onnxruntime-win-x64-1.22.0.zip -o"apps/screenpipe-app-tauri/src-tauri/" -y
        if (Test-Path $ortDir) { Remove-Item $ortDir -Recurse -Force }
        Copy-Item -Path $tauriDir -Destination $ortDir -Recurse -Force

    - name: Set ORT env vars
      shell: bash
      run: |
        echo "ORT_STRATEGY=system" >> $GITHUB_ENV
        echo "ORT_LIB_LOCATION=${{ github.workspace }}/ort-system-lib" >> $GITHUB_ENV

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: ./apps/screenpipe-app-tauri/.next
        key: ${{ runner.os }}-next-v2-${{ hashFiles('apps/screenpipe-app-tauri/package.json', 'apps/screenpipe-app-tauri/bun.lock', 'apps/screenpipe-app-tauri/next.config.mjs', 'apps/screenpipe-app-tauri/postcss.config.mjs', 'apps/screenpipe-app-tauri/app/**', 'apps/screenpipe-app-tauri/components/**', 'apps/screenpipe-app-tauri/lib/**', 'apps/screenpipe-app-tauri/styles/**') }}
        restore-keys: |
          ${{ runner.os }}-next-v2-

    - name: Build
      uses: tauri-apps/tauri-action@v0.5.17
      env:
        OPENBLAS_PATH: ${{ github.workspace }}/apps/screenpipe-app-tauri/src-tauri/openblas
      with:
        args: "--no-sign --debug --no-bundle -- --features e2e"
        projectPath: "./apps/screenpipe-app-tauri"
        tauriScript: bunx tauri -v

    # ORT_STRATEGY=system links against onnxruntime.lib but does NOT copy
    # onnxruntime.dll next to the test binary the way the default
    # download-binaries+copy-dylibs path would. Without a copy here the
    # Windows DLL loader fails to find onnxruntime.dll at runtime and the
    # screenpipe-server thread panics with "Failed to initialize ORT API"
    # on the very first ort::api() call. Tauri's bundle step does this for
    # release builds (see tauri.windows.conf.json resourcesMap), but
    # `--no-bundle` skips it.
    - name: Stage ONNX Runtime DLLs next to test binary
      shell: pwsh
      run: |
        $src = "${{ github.workspace }}/ort-system-lib/lib"
        $dst = "${{ github.workspace }}/apps/screenpipe-app-tauri/src-tauri/target/debug"
        if (-not (Test-Path $dst)) {
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
        }
        # Always remove any existing onnxruntime*.dll at the destination
        # before copying. Why this is necessary: prior cancelled runs
        # could have left 0-byte stubs at target/debug/onnxruntime*.dll
        # which Swatinem/rust-cache then preserves across runs — once
        # cached, every subsequent run inherits the stubs and the test
        # binary fails to load ORT. Force-copy alone wasn't enough
        # because the earlier per-file try/catch (with Resolve-Path
        # comparison) was firing the self-overwrite catch on every
        # copy under cause-unknown PowerShell path normalization,
        # silently no-op'ing the actual copy.
        # Use [System.IO.File]::Copy directly — fewer PowerShell
        # wrapper quirks than Copy-Item.
        Get-ChildItem -Path $src -Filter "onnxruntime*.dll" | ForEach-Object {
          $dest = Join-Path $dst $_.Name
          if (Test-Path $dest) { Remove-Item -Path $dest -Force }
          [System.IO.File]::Copy($_.FullName, $dest, $true)
        }
        # Verify each DLL is non-zero. If any is 0 bytes the test
        # binary will exit STATUS_DLL_NOT_FOUND (0xc0000135) at load
        # time — fail here loudly instead of debugging from the
        # downstream symptom.
        Get-ChildItem -Path $dst -Filter "onnxruntime*.dll" | ForEach-Object {
          if ($_.Length -eq 0) {
            throw "Staged DLL is 0 bytes: $($_.Name) — source likely corrupt"
          }
          Write-Host "$($_.Name)  $($_.Length) bytes"
        }

    - name: Run E2E Tests
      shell: pwsh
      working-directory: ./apps/screenpipe-app-tauri
      env:
        RECORD_VIDEO: "true"
      run: |
        bun run test:e2e

    - name: Upload E2E Test Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: windows-e2e-test-artifacts
        path: |
          ./apps/screenpipe-app-tauri/e2e/videos
          ./apps/screenpipe-app-tauri/e2e/screenshots

    - name: Upload Screenpipe data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: windows-screenpipe-data
        include-hidden-files: true
        path: ./apps/screenpipe-app-tauri/.e2e

  linux-e2e-test:
    name: Linux E2E Tests
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C link-arg=-fuse-ld=mold"
      # WebKit2GTK + xvfb workarounds. Without these, WebKit2GTK 4.1
      # raises `WebLoaderStrategy::internallyFailedLoadTimerFired()`
      # during the first navigation and the Tauri webview never
      # renders the app — `[data-testid="home-page"]` never appears,
      # every spec then fails its `before all` hook on
      # openHomeWindow(). The fixes:
      #
      # - WEBKIT_DISABLE_DMABUF_RENDERER=1 — DMABuf compositing wants
      #   a real GPU pipeline; on xvfb the buffer pass-through fails
      #   silently (timer-fired error above).
      # - WEBKIT_DISABLE_COMPOSITING_MODE=1 — accelerated compositing
      #   has no GL backing under xvfb; turning it off forces the
      #   software renderer that DOES work.
      # - WEBKIT_FORCE_SANDBOX=0 — the bubblewrap sandbox can't
      #   open /proc inside the GH Actions container, blocking the
      #   web process from spawning.
      # - LIBGL_ALWAYS_SOFTWARE=1 — belt-and-suspenders; ensures
      #   any residual GL paths use llvmpipe.
      WEBKIT_DISABLE_DMABUF_RENDERER: "1"
      WEBKIT_DISABLE_COMPOSITING_MODE: "1"
      WEBKIT_FORCE_SANDBOX: "0"
      LIBGL_ALWAYS_SOFTWARE: "1"
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Cache and install all Linux dependencies
      uses: awalsh128/cache-apt-pkgs-action@v1.6.0
      with:
        version: ${{ hashFiles('apps/screenpipe-app-tauri/scripts/pre_build.js') }}
        packages: >
          tesseract-ocr libtesseract-dev ffmpeg pkg-config build-essential libglib2.0-dev
          libgtk-3-dev libwebkit2gtk-4.1-dev clang cmake
          libavutil-dev libavformat-dev libavfilter-dev libavdevice-dev
          libasound2-dev libxdo-dev
          g++ libssl-dev libsoup-3.0-0 libsdl2-dev libclang-dev libxtst-dev libx11-dev
          libxext-dev libxrandr-dev libxinerama-dev libxcursor-dev
          libxi-dev libgl1-mesa-dev mesa-utils libgl1-mesa-dri libegl1-mesa-dev
          libasound2-dev libpulse-dev
          curl desktop-file-utils xdg-utils dbus-x11 xvfb
          x11-xserver-utils pkg-config libsqlite3-dev libbz2-dev
          zlib1g-dev libonig-dev libayatana-appindicator3-dev
          libsamplerate-dev libwebrtc-audio-processing-dev libgtk-3-dev
          libwebkit2gtk-4.1-dev webkit2gtk-driver librsvg2-dev
          patchelf x11-utils x11-apps xdotool openbox xterm
          fonts-liberation imagemagick fonts-dejavu alsa-utils
          pulseaudio pulseaudio-utils libpipewire-0.3-dev
          libgbm-dev libwayland-dev libegl-dev libopenblas-dev mold

    - name: Normalize OpenBLAS paths for antirez-asr-sys
      run: |
        set -euo pipefail
        sudo mkdir -p /usr/lib/x86_64-linux-gnu/openblas/lib
        sudo mkdir -p /usr/lib/x86_64-linux-gnu/openblas/include

        # The apt cache action sometimes restores files onto disk without
        # updating the dpkg database, so `dpkg -L libopenblas-dev` can come
        # back empty. And the libopenblas layout differs across Ubuntu
        # releases — 24.04 (noble) moved the real .so under /usr/lib/.../openblas-pthread/
        # with update-alternatives managing the visible path. Find it by
        # pattern across both layouts, and force a fresh install if nothing
        # is on disk at all.
        find_openblas_so() {
          # Prefer the versioned SONAME (e.g. libopenblas.so.0 — the
          # actual library file) over the unversioned libopenblas.so
          # (typically managed by update-alternatives, points at the
          # versioned file). If we pick the unversioned form as REAL_SO,
          # the SONAME-based `ln -sf $REAL_SO /usr/.../$SONAME` below
          # becomes `ln -sf X X` which removes X and creates a dangling
          # symlink-to-self — `test -e` then fails the sanity check.
          local versioned
          versioned="$(find /usr/lib /usr/local/lib /lib 2>/dev/null \
            -name 'libopenblas.so.*' -print 2>/dev/null | head -1)"
          if [ -n "$versioned" ]; then
            printf '%s\n' "$versioned"
            return
          fi
          # Fallback: unversioned name. Rare on standard Ubuntu images
          # but defended against self-symlinks below.
          find /usr/lib /usr/local/lib /lib 2>/dev/null \
            -name 'libopenblas.so' -print 2>/dev/null | head -1
        }

        REAL_SO="$(find_openblas_so)"
        if [ -z "$REAL_SO" ]; then
          echo "libopenblas not found on disk — forcing fresh install"
          sudo apt-get update -qq
          sudo apt-get install -y --reinstall libopenblas-dev
          REAL_SO="$(find_openblas_so)"
        fi
        if [ -z "$REAL_SO" ]; then
          echo "::error::libopenblas still not found after --reinstall"
          dpkg -L libopenblas-dev 2>/dev/null | head -20 || true
          find /usr/lib /usr/local/lib /lib -name 'libopenblas*' 2>/dev/null | head -20 || true
          exit 1
        fi
        echo "libopenblas.so -> $REAL_SO"

        REAL_A="$(find /usr/lib /usr/local/lib /lib -name 'libopenblas.a' 2>/dev/null | head -1 || true)"
        [ -n "$REAL_A" ] && echo "libopenblas.a  -> $REAL_A"

        sudo ln -sf "$REAL_SO" /usr/lib/x86_64-linux-gnu/openblas/lib/liblibopenblas.so
        [ -n "$REAL_A" ] && sudo ln -sf "$REAL_A" /usr/lib/x86_64-linux-gnu/openblas/lib/liblibopenblas.a

        # antirez-asr-sys emits `-l libopenblas` (double-lib) to match the Windows
        # naming, but its build.rs doesn't add OPENBLAS_PATH/lib to the linker
        # search path. Drop the symlink into /usr/lib/x86_64-linux-gnu/ — a
        # standard search path — so mold resolves -llibopenblas.
        sudo ln -sf "$REAL_SO" /usr/lib/x86_64-linux-gnu/liblibopenblas.so
        [ -n "$REAL_A" ] && sudo ln -sf "$REAL_A" /usr/lib/x86_64-linux-gnu/liblibopenblas.a

        # Runtime loader (ld.so) looks up the SONAME (`libopenblas.so.0`) in the
        # default search path. The apt cache action restores the .so into the
        # openblas-pthread/ subdir but may not install the ld.so.conf.d fragment
        # or run ldconfig, so the binary exits 127 at startup with
        # "error while loading shared libraries: libopenblas.so.0". Symlink the
        # SONAME and the unsuffixed name into the default path.
        SONAME="$(basename "$REAL_SO")"  # e.g. libopenblas.so.0
        # Defensive: only create the SONAME / unversioned symlinks if
        # the destination differs from REAL_SO. ln -sf to self removes
        # the file before creating the link, leaving a dangling symlink
        # — silent breakage that surfaces 100ms later as `test -e`
        # exits 1. Belt-and-suspenders with the find_openblas_so fix
        # above which already prefers the versioned file.
        SONAME_DEST="/usr/lib/x86_64-linux-gnu/${SONAME}"
        if [ "$REAL_SO" != "$SONAME_DEST" ]; then
          sudo ln -sf "$REAL_SO" "$SONAME_DEST"
        fi
        UNVER_DEST="/usr/lib/x86_64-linux-gnu/libopenblas.so"
        if [ "$REAL_SO" != "$UNVER_DEST" ]; then
          sudo ln -sf "$REAL_SO" "$UNVER_DEST"
        fi
        sudo ldconfig

        # Sanity check: the symlinks must be non-dangling (-e follows links).
        test -e /usr/lib/x86_64-linux-gnu/liblibopenblas.so
        test -e /usr/lib/x86_64-linux-gnu/openblas/lib/liblibopenblas.so
        test -e "/usr/lib/x86_64-linux-gnu/${SONAME}"
        ldconfig -p | grep libopenblas || true
        ls -la /usr/lib/x86_64-linux-gnu/liblibopenblas.* /usr/lib/x86_64-linux-gnu/libopenblas.* /usr/lib/x86_64-linux-gnu/openblas/lib/liblibopenblas.*
        CBLAS_HEADER="$(find /usr/include /usr/lib -name cblas.h 2>/dev/null | head -n1 || true)"
        if [ -z "$CBLAS_HEADER" ]; then
          CBLAS_HEADER="$(dpkg -L libopenblas-dev | grep -m1 '/cblas\.h$' || true)"
        fi
        if [ -n "$CBLAS_HEADER" ]; then
          CBLAS_DIR="$(dirname "$CBLAS_HEADER")"
          sudo ln -sf "$CBLAS_HEADER" /usr/include/cblas.h
          sudo ln -sf "$CBLAS_HEADER" /usr/lib/x86_64-linux-gnu/openblas/include/cblas.h
          echo "C_INCLUDE_PATH=$CBLAS_DIR:/usr/include:/usr/lib/x86_64-linux-gnu/openblas/include:${C_INCLUDE_PATH:-}" >> "$GITHUB_ENV"
          echo "CFLAGS=-I$CBLAS_DIR -I/usr/include -I/usr/lib/x86_64-linux-gnu/openblas/include ${CFLAGS:-}" >> "$GITHUB_ENV"
        fi
        echo "OPENBLAS_PATH=/usr/lib/x86_64-linux-gnu/openblas" >> "$GITHUB_ENV"

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        override: true
        rustflags: ""
        target: x86_64-unknown-linux-gnu

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure sccache
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/screenpipe-app-tauri/src-tauri
        shared-key: screenpipe-tauri-e2e

    - name: Install frontend dependencies
      working-directory: ./apps/screenpipe-app-tauri
      run: bun install --frozen-lockfile

    - name: Cache Linux build artifacts
      uses: actions/cache@v4
      with:
        path: |
          apps/screenpipe-app-tauri/src-tauri/ffmpeg
          apps/screenpipe-app-tauri/src-tauri/tesseract
          apps/screenpipe-app-tauri/src-tauri/bun-x86_64-unknown-linux-gnu
        key: Linux-e2e-artifacts-v2-${{ hashFiles('apps/screenpipe-app-tauri/scripts/pre_build.js') }}
        restore-keys: |
          Linux-e2e-artifacts-v2-

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: ./apps/screenpipe-app-tauri/.next
        key: ${{ runner.os }}-next-v2-${{ hashFiles('apps/screenpipe-app-tauri/package.json', 'apps/screenpipe-app-tauri/bun.lock', 'apps/screenpipe-app-tauri/next.config.mjs', 'apps/screenpipe-app-tauri/postcss.config.mjs', 'apps/screenpipe-app-tauri/app/**', 'apps/screenpipe-app-tauri/components/**', 'apps/screenpipe-app-tauri/lib/**', 'apps/screenpipe-app-tauri/styles/**') }}
        restore-keys: |
          ${{ runner.os }}-next-v2-

    - name: Build
      uses: tauri-apps/tauri-action@v0.5.17
      env:
        OPENBLAS_PATH: ${{ env.OPENBLAS_PATH }}
      with:
        args: "--no-sign --debug --no-bundle -- --features e2e"
        projectPath: "./apps/screenpipe-app-tauri"
        tauriScript: bunx tauri -v

    - name: Set up virtual display with window manager
      run: .github/scripts/setup_display.sh

    - name: Setup audio
      run: .github/scripts/setup_audio.sh

    - name: Run E2E Tests
      shell: bash
      working-directory: ./apps/screenpipe-app-tauri
      run: |
        export XDG_RUNTIME_DIR=/run/user/$(id -u)
        export XDG_CONFIG_HOME="$HOME/.config"
        export XDG_DATA_HOME="$HOME/.local/share"
        export XDG_CACHE_HOME="$HOME/.cache"
        export PULSE_SERVER=unix:${XDG_RUNTIME_DIR}/pulse/native
        export DISPLAY=:99
        export RECORD_VIDEO=1

        bun run test:e2e

    - name: Upload E2E Test Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: linux-e2e-test-artifacts
        path: |
          ./apps/screenpipe-app-tauri/e2e/videos
          ./apps/screenpipe-app-tauri/e2e/screenshots

    - name: Upload Screenpipe data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: linux-screenpipe-data
        include-hidden-files: true
        path: ./apps/screenpipe-app-tauri/.e2e

  macos-e2e-test:
    name: macOS E2E Tests
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.10

    - name: Set up Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1
      with:
        toolchain: stable
        override: true
        rustflags: ""
        target: aarch64-apple-darwin

    - name: Setup sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure sccache
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - name: Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: apps/screenpipe-app-tauri/src-tauri
        shared-key: screenpipe-tauri-e2e

    - name: Cache macOS build artifacts
      uses: actions/cache@v4
      with:
        path: |
          apps/screenpipe-app-tauri/src-tauri/ffmpeg-aarch64-apple-darwin
          apps/screenpipe-app-tauri/src-tauri/ffprobe-aarch64-apple-darwin
          apps/screenpipe-app-tauri/src-tauri/bun-aarch64-apple-darwin
          apps/screenpipe-app-tauri/src-tauri/bun-x86_64-apple-darwin
        key: macOS-e2e-artifacts-v2-${{ hashFiles('apps/screenpipe-app-tauri/scripts/pre_build.js') }}
        restore-keys: |
          macOS-e2e-artifacts-v2-

    - name: Install frontend dependencies
      working-directory: apps/screenpipe-app-tauri
      shell: bash
      run: bun install --frozen-lockfile

    - name: Cache Next.js build
      uses: actions/cache@v4
      with:
        path: ./apps/screenpipe-app-tauri/.next
        key: ${{ runner.os }}-next-v2-${{ hashFiles('apps/screenpipe-app-tauri/package.json', 'apps/screenpipe-app-tauri/bun.lock', 'apps/screenpipe-app-tauri/next.config.mjs', 'apps/screenpipe-app-tauri/postcss.config.mjs', 'apps/screenpipe-app-tauri/app/**', 'apps/screenpipe-app-tauri/components/**', 'apps/screenpipe-app-tauri/lib/**', 'apps/screenpipe-app-tauri/styles/**') }}
        restore-keys: |
          ${{ runner.os }}-next-v2-

    - name: Build
      uses: tauri-apps/tauri-action@v0.5.17
      with:
        args: "--no-sign --debug --no-bundle -- --features e2e"
        projectPath: "./apps/screenpipe-app-tauri"
        tauriScript: bunx tauri -v

    - name: Run E2E Tests
      shell: bash
      working-directory: ./apps/screenpipe-app-tauri
      env:
        RECORD_VIDEO: "true"
      run: |
        bun run test:e2e

    - name: Upload E2E Test Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: macos-e2e-test-artifacts
        path: |
          ./apps/screenpipe-app-tauri/e2e/videos
          ./apps/screenpipe-app-tauri/e2e/screenshots

    - name: Upload Screenpipe data
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: macos-screenpipe-data
        include-hidden-files: true
        path: ./apps/screenpipe-app-tauri/.e2e
